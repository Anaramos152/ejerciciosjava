<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/ejercicio3.css">
</head>
<body>
    <div class="calculator-card">
    <h2>Calculadora de Propinas</h2>
    
    <label>Valor de la cuenta:</label>
    <input type="number" id="cuenta" placeholder="Ej: 50000">
    
    <label>Porcentaje de propina (5, 10 o 15):</label>
    <input type="number" id="porcentaje" placeholder="5, 10 o 15">
    
    <button id="btnCalcular">Calcular Total</button>
    
    <div id="mensajeError" class="error"></div>
    
    <div id="resultado" class="resultado-box" style="display: none;">
        <p>Propina: <span id="valorPropina"></span></p>
        <p>Total a pagar: <span id="valorTotal"></span></p>
    </div>
</div>

<script src="js/ejercicio3.js"></script>
</body>
</html>
